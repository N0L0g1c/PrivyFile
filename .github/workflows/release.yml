name: Release PrivyFile

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            label: windows
          - platform: ubuntu-22.04
            args: ""
            label: linux
          - platform: macos-latest
            args: ""
            label: macos

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.platform == 'windows-latest'
        with:
          targets: x86_64-pc-windows-msvc

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.platform != 'windows-latest'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            perl \
            curl

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch bundled ExifTool
        run: npm run fetch-exiftool

      - name: Verify bundled ExifTool
        run: npm run verify-exiftool

      - name: Build Tauri app
        run: npm run tauri build -- ${{ matrix.args }}
        env:
          CI: true

      - name: Verify ExifTool in Windows installer
        if: runner.os == 'Windows'
        run: npm run verify-exiftool:installer

      - name: Locate bundle directory
        id: bundle
        shell: bash
        run: |
          BUNDLE_DIR="$(find src-tauri/target -path '*/release/bundle' -type d | head -n 1)"
          if [[ -z "$BUNDLE_DIR" ]]; then
            echo "No Tauri bundle directory found under src-tauri/target" >&2
            find src-tauri/target -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi
          echo "dir=$BUNDLE_DIR" >> "$GITHUB_OUTPUT"
          echo "Bundle directory: $BUNDLE_DIR"
          find "$BUNDLE_DIR" -type f | sort

      - name: Stage installer files
        id: staging
        shell: bash
        run: |
          BUNDLE_DIR="${{ steps.bundle.outputs.dir }}"
          STAGING="${RUNNER_TEMP}/privyfile-installers"
          mkdir -p "$STAGING"

          mapfile -t FILES < <(find "$BUNDLE_DIR" -type f \( \
            -iname '*.msi' -o \
            -iname '*setup.exe' -o \
            -iname '*.deb' -o \
            -iname '*.appimage' -o \
            -iname '*.rpm' -o \
            -iname '*.dmg' -o \
            -iname '*.app.tar.gz' \
          \) | sort)

          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "No installer files found in $BUNDLE_DIR" >&2
            exit 1
          fi

          for file in "${FILES[@]}"; do
            base="$(basename "$file")"
            cp -v "$file" "$STAGING/${{ matrix.label }}-${base}"
          done

          ls -la "$STAGING"
          echo "dir=$STAGING" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.label }}
          path: ${{ steps.staging.outputs.dir }}/*
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: |
          echo "Release assets to upload:"
          find release-assets -type f | sort
          if [[ -z "$(find release-assets -type f | head -n 1)" ]]; then
            echo "No release assets downloaded from build jobs" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PrivyFile ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
